name = "agentpki-verifier"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

# Custom domain — wrangler auto-creates the DNS record under the agentpki.dev
# zone on deploy. Required for cross-Worker fetches (same-account workers.dev
# routing returns 404 on inter-Worker calls; custom domains go through the
# public edge and work normally).
[[routes]]
pattern = "verify.agentpki.dev"
zone_name = "agentpki.dev"
custom_domain = true

# ─── v0.2 bindings ─────────────────────────────────────────────────────
# All are OPTIONAL. The verifier degrades gracefully if any are absent:
#   - ISSUER_CACHE missing → falls back to per-isolate in-memory cache
#   - CRL_CACHE missing    → CRL fetched fresh on every check (slower)
#   - ABUSE_REPORTS missing → /v1/abuse/report accepts but doesn't persist
#   - REPLAY_CACHE missing → replay detection is skipped (Mode B trust drops)
#
# Provision the KV namespaces ONCE, then paste the returned IDs below and
# redeploy. See README for the wrangler commands.

# [[kv_namespaces]]
# binding = "ISSUER_CACHE"
# id = "<run: wrangler kv namespace create ISSUER_CACHE>"

# [[kv_namespaces]]
# binding = "CRL_CACHE"
# id = "<run: wrangler kv namespace create CRL_CACHE>"

# [[kv_namespaces]]
# binding = "ABUSE_REPORTS"
# id = "<run: wrangler kv namespace create ABUSE_REPORTS>"

# Durable Object for cross-isolate replay detection (Mode B)
# Auto-provisions on first deploy when this stanza is uncommented.
# [[durable_objects.bindings]]
# name = "REPLAY_CACHE"
# class_name = "ReplayCacheDO"

# Required when introducing the new DO class
# [[migrations]]
# tag = "v2"
# new_sqlite_classes = ["ReplayCacheDO"]

[vars]
VERIFIER_ID = "agentpki-verifier-edge"
SPEC_URL = "https://agentpki.dev/spec/v0.1"
