name = "agentpki-verifier"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

# Custom domain — wrangler auto-creates the DNS record under the agentpki.dev
# zone on deploy. Required for cross-Worker fetches (same-account workers.dev
# routing returns 404 on inter-Worker calls; custom domains go through the
# public edge and work normally).
[[routes]]
pattern = "verify.agentpki.dev"
zone_name = "agentpki.dev"
custom_domain = true

# ─── v0.2 bindings ─────────────────────────────────────────────────────
# Provisioned via:
#   wrangler kv namespace create <NAME>
# IDs below come from the responses to those commands. Verifier degrades
# gracefully if any binding is absent (see src/cache.ts, src/crl.ts, etc).

[[kv_namespaces]]
binding = "ISSUER_CACHE"
id = "35af4f0e393f4d0a860f37c44ef15048"

[[kv_namespaces]]
binding = "CRL_CACHE"
id = "2c1f743f048a4ee8ac67a1c5d7870de4"

[[kv_namespaces]]
binding = "ABUSE_REPORTS"
id = "b79993f2c7b140178c884b7b148111c5"

# Durable Object for cross-isolate replay detection (Mode B integrity).
# Auto-provisions on first deploy that includes this stanza.
[[durable_objects.bindings]]
name = "REPLAY_CACHE"
class_name = "ReplayCacheDO"

# Required when introducing the new DO class
[[migrations]]
tag = "v2"
new_sqlite_classes = ["ReplayCacheDO"]

[vars]
VERIFIER_ID = "agentpki-verifier-edge"
SPEC_URL = "https://agentpki.dev/spec/v0.1"
